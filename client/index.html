    <script>

        var designWidth = 1200;
        var screenWidth = window.screen.width;
        var scale = screenWidth / designWidth;
        var viewport = document.getElementById('viewport-meta');
        viewport.setAttribute('content', 'width=' + designWidth + ', initial-scale=' + scale + ', minimum-scale=' + scale + ', maximum-scale=' + scale);
      })();
    </script>

  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          (event.reason.message && event.reason.message.includes('MetaMask')) ||
          (event.reason.message && event.reason.message.includes('User rejected')) ||
          event.reason.code === 4001 ||
          event.reason.code === -32603
        )) {
          event.preventDefault();
          console.info('Wallet connection error handled by app');
        }
      });
      
      // Desktop auto-zoom based on screen resolution
      (function() {
        var lastScreenWidth = 0;
        
        function applyDesktopZoom() {
          // Only apply on desktop (not touch devices)
          var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
          var isCoarse = window.matchMedia('(pointer: coarse)').matches;
          
          if (isTouch || isCoarse) {
            document.documentElement.style.zoom = '';
            document.documentElement.style.setProperty('--viewport-height', '100vh');
            return;
          }
          
          var screenWidth = window.screen.width;
          
          // Only update if screen changed
          if (screenWidth === lastScreenWidth) return;
          lastScreenWidth = screenWidth;
          
          var zoomLevel = 1;
          
          // Apply zoom based on screen resolution
          if (screenWidth >= 2400) {
            zoomLevel = 1;
          } else if (screenWidth >= 1800) {
            zoomLevel = 0.80;
          } else if (screenWidth >= 1500) {
            zoomLevel = 0.70;
          } else if (screenWidth >= 1300) {
            zoomLevel = 0.60;
          } else if (screenWidth >= 1000) {
            zoomLevel = 0.55;
          } else {
            zoomLevel = 1;
          }
          
          document.documentElement.style.zoom = zoomLevel;
          // Compensate for zoom by increasing viewport height
          var compensatedHeight = 'calc(100vh / ' + zoomLevel + ')';
          document.documentElement.style.setProperty('--viewport-height', compensatedHeight);
        }
        
        // Apply on load
        applyDesktopZoom();
        
        // Re-check periodically (for monitor switching)
        setInterval(applyDesktopZoom, 1000);
        
        // Also check on resize and focus
        window.addEventListener('resize', applyDesktopZoom);
        window.addEventListener('focus', applyDesktopZoom);
      })();
    </script>
